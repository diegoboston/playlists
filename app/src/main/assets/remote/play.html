<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Stage Manager Remote</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #000; color: #fff; font-family: system-ui, sans-serif; overflow: hidden; touch-action: none; }
    #bar { background: rgba(0,0,0,.8); padding: 10px 12px; text-align: center; font-size: 14px; line-height: 1.4; }
    #barTop { display: flex; align-items: center; justify-content: center; gap: 10px; }
    #title { font-weight: 700; }
    #editBtn { background: none; border: none; color: #fff; padding: 4px; cursor: pointer; line-height: 0; border-radius: 6px; }
    #editBtn:disabled { opacity: .35; cursor: default; }
    #editBtn svg { width: 22px; height: 22px; fill: currentColor; }
    #uploadBtn { background: none; border: none; color: #fff; padding: 4px; cursor: pointer; line-height: 0; border-radius: 6px; font-size: 22px; font-weight: 700; width: 30px; height: 30px; }
    #uploadBtn:disabled { opacity: .35; cursor: default; }
    #meta { opacity: .85; font-size: 13px; margin-top: 2px; }
    #stage { height: calc(100% - 56px); display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
    #zoomWrap { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; transform-origin: center center; will-change: transform; }
    #media { max-width: 100%; max-height: 100%; object-fit: contain; user-select: none; -webkit-user-drag: none; pointer-events: none; }
    #hint { position: absolute; bottom: 16px; left: 0; right: 0; text-align: center; opacity: .55; font-size: 12px; pointer-events: none; }
    #empty { padding: 24px; text-align: center; opacity: .8; }
    #uploadOverlay { position: fixed; inset: 0; background: rgba(0,0,0,.75); display: flex; align-items: center; justify-content: center; padding: 16px; z-index: 10; }
    #uploadOverlay[hidden] { display: none; }
    #uploadForm { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 20px; width: min(400px, 100%); }
    #uploadForm h2 { font-size: 18px; margin-bottom: 16px; }
    #uploadForm label { display: block; font-size: 13px; opacity: .8; margin-bottom: 4px; }
    #uploadForm input[type="text"] { width: 100%; padding: 10px; margin-bottom: 12px; border: 1px solid #444; border-radius: 8px; background: #000; color: #fff; font-size: 16px; }
    #uploadForm input[type="file"] { width: 100%; margin-bottom: 12px; color: #ccc; font-size: 14px; }
    #uploadDropZone { border: 2px dashed #555; border-radius: 10px; padding: 28px 16px; margin-bottom: 12px; text-align: center; cursor: pointer; transition: border-color .15s, background .15s; }
    #uploadDropZone.drag-over { border-color: #7ecbff; background: rgba(126,203,255,.08); }
    #uploadDropZone.has-file { border-style: solid; border-color: #444; }
    #dropZoneText { font-size: 14px; opacity: .75; display: block; }
    #dropZoneFile { font-size: 14px; color: #7ecbff; display: block; margin-top: 4px; }
    #uploadError { color: #ff8a80; font-size: 13px; margin-bottom: 12px; min-height: 1.2em; }
    #uploadActions { display: flex; gap: 10px; justify-content: flex-end; }
    #uploadActions button { padding: 10px 16px; border-radius: 8px; border: none; font-size: 15px; cursor: pointer; }
    #uploadCancel { background: #333; color: #fff; }
    #uploadSubmit { background: #7ecbff; color: #000; font-weight: 600; }
    #uploadSubmit:disabled { opacity: .5; cursor: default; }
  </style>
</head>
<body>
  <div id="bar">
    <div id="barTop">
      <div id="title">Stage Manager</div>
      <button id="uploadBtn" type="button" aria-label="Upload song" title="Upload song">+</button>
      <button id="editBtn" type="button" aria-label="Edit playlist" title="Edit playlist">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1.003 1.003 0 0 0 0-1.42l-2.34-2.34a1.003 1.003 0 0 0-1.42 0l-1.83 1.83 3.75 3.75 1.84-1.82z"/></svg>
      </button>
    </div>
    <div id="meta"></div>
  </div>
  <div id="stage">
    <div id="zoomWrap" hidden>
      <img id="media" alt="" />
    </div>
    <div id="empty" hidden>No songs in this playlist.</div>
    <div id="hint">Tap left/right · pinch to zoom · swipe · arrow keys</div>
  </div>
  <div id="uploadOverlay" hidden>
    <form id="uploadForm">
      <h2>Upload song</h2>
      <label for="uploadTitle">Title</label>
      <input id="uploadTitle" type="text" autocomplete="off" />
      <label for="uploadKey">Key</label>
      <input id="uploadKey" type="text" autocomplete="off" />
      <label for="uploadNotes">Notes</label>
      <input id="uploadNotes" type="text" autocomplete="off" />
      <label for="uploadFile">File (PDF or image)</label>
      <div id="uploadDropZone" role="button" tabindex="0" aria-label="Drop or choose file">
        <span id="dropZoneText">Drop PDF or image here, or tap to choose</span>
        <span id="dropZoneFile" hidden></span>
      </div>
      <input id="uploadFile" type="file" accept="image/*,application/pdf,.pdf" required hidden />
      <div id="uploadError"></div>
      <div id="uploadActions">
        <button id="uploadCancel" type="button">Cancel</button>
        <button id="uploadSubmit" type="submit">Save</button>
      </div>
    </form>
  </div>
  <script>
    // Keep in sync with PlaybackNav.kt
    const NAV = {
      TAP_MOVE_PX: 12,
      SWIPE_PX: 48,
      ZOOM_NAV_MAX: 1.05,
      MAX_ZOOM: 5,
    };

    const zoomWrap = document.getElementById('zoomWrap');
    const media = document.getElementById('media');
    const metaEl = document.getElementById('meta');
    const emptyEl = document.getElementById('empty');
    const stage = document.getElementById('stage');
    const editBtn = document.getElementById('editBtn');
    const uploadBtn = document.getElementById('uploadBtn');
    const uploadOverlay = document.getElementById('uploadOverlay');
    const uploadForm = document.getElementById('uploadForm');
    const uploadTitle = document.getElementById('uploadTitle');
    const uploadKey = document.getElementById('uploadKey');
    const uploadNotes = document.getElementById('uploadNotes');
    const uploadFile = document.getElementById('uploadFile');
    const uploadError = document.getElementById('uploadError');
    const uploadSubmit = document.getElementById('uploadSubmit');
    const uploadCancel = document.getElementById('uploadCancel');
    const uploadDropZone = document.getElementById('uploadDropZone');
    const dropZoneText = document.getElementById('dropZoneText');
    const dropZoneFile = document.getElementById('dropZoneFile');

    function isAllowedFile(file) {
      if (!file) return false;
      const type = file.type || '';
      if (type.startsWith('image/') || type === 'application/pdf') return true;
      const name = file.name.toLowerCase();
      return /\.(pdf|png|jpe?g|gif|webp)$/.test(name);
    }

    function setUploadFile(file) {
      if (!isAllowedFile(file)) {
        uploadError.textContent = 'Choose a PDF or image.';
        return false;
      }
      const dt = new DataTransfer();
      dt.items.add(file);
      uploadFile.files = dt.files;
      uploadDropZone.classList.add('has-file');
      dropZoneText.hidden = true;
      dropZoneFile.hidden = false;
      dropZoneFile.textContent = file.name;
      applyFilenameSuggestions(file.name);
      uploadError.textContent = '';
      return true;
    }

    async function applyFilenameSuggestions(filename) {
      try {
        const res = await fetch('/api/parse-filename?raw=' + encodeURIComponent(filename));
        if (!res.ok) throw new Error('parse failed');
        const parsed = await res.json();
        uploadTitle.value = parsed.title || '';
        uploadKey.value = parsed.key || '';
        uploadNotes.value = parsed.notes || '';
      } catch (_) {
        uploadTitle.value = filename.replace(/\.[^.]+$/, '').replace(/_/g, ' ');
        uploadKey.value = '';
        uploadNotes.value = '';
      }
    }

    function clearUploadFile() {
      uploadFile.value = '';
      uploadDropZone.classList.remove('has-file');
      dropZoneText.hidden = false;
      dropZoneFile.hidden = true;
      dropZoneFile.textContent = '';
    }

    let touchStartX = 0;
    let touchStartY = 0;
    let busy = false;
    let connectionLost = false;
    let lastSongIndex = -1;
    let lastPageIndex = -1;
    let scale = 1;
    let offsetX = 0;
    let offsetY = 0;
    let pinchStartDist = 0;
    let pinchStartScale = 1;
    let panStartX = 0;
    let panStartY = 0;
    let panOffsetStartX = 0;
    let panOffsetStartY = 0;
    let tapMoved = false;
    let lastTouchEnd = 0;

    function handleSideTap(clientX) {
      if (busy || scale > NAV.ZOOM_NAV_MAX) return;
      const rect = stage.getBoundingClientRect();
      const x = clientX - rect.left;
      if (x >= rect.width / 2) navigate('next');
      else navigate('prev');
    }

    function openUpload() {
      if (busy) return;
      uploadError.textContent = '';
      uploadTitle.value = '';
      uploadKey.value = '';
      uploadNotes.value = '';
      clearUploadFile();
      uploadOverlay.hidden = false;
    }

    function closeUpload() {
      uploadOverlay.hidden = true;
      uploadError.textContent = '';
    }

    uploadBtn.addEventListener('click', openUpload);
    editBtn.addEventListener('click', () => {
      if (busy) return;
      window.location.href = '/edit';
    });
    uploadCancel.addEventListener('click', closeUpload);

    uploadDropZone.addEventListener('click', () => uploadFile.click());
    uploadDropZone.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        uploadFile.click();
      }
    });

    ['dragenter', 'dragover'].forEach((type) => {
      uploadDropZone.addEventListener(type, (e) => {
        e.preventDefault();
        e.stopPropagation();
        uploadDropZone.classList.add('drag-over');
      });
    });
    ['dragleave', 'drop'].forEach((type) => {
      uploadDropZone.addEventListener(type, (e) => {
        e.preventDefault();
        e.stopPropagation();
        uploadDropZone.classList.remove('drag-over');
      });
    });
    uploadDropZone.addEventListener('drop', (e) => {
      const file = e.dataTransfer?.files?.[0];
      if (file) setUploadFile(file);
    });

    uploadFile.addEventListener('change', () => {
      const file = uploadFile.files?.[0];
      if (file) setUploadFile(file);
    });

    uploadForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (busy) return;
      const file = uploadFile.files?.[0];
      if (!file) {
        uploadError.textContent = 'Choose a PDF or image.';
        return;
      }
      busy = true;
      uploadSubmit.disabled = true;
      uploadError.textContent = '';
      try {
        const formData = new FormData();
        formData.append('title', uploadTitle.value.trim());
        formData.append('key', uploadKey.value.trim());
        formData.append('notes', uploadNotes.value.trim());
        formData.append('filename', file.name);
        formData.append('mime', file.type || 'application/octet-stream');
        formData.append('file', file);
        const res = await fetch('/api/upload', { method: 'POST', body: formData });
        if (!res.ok) {
          const body = await res.json().catch(() => ({}));
          throw new Error(body.error || 'Upload failed');
        }
        closeUpload();
        lastSongIndex = -1;
        lastPageIndex = -1;
        await refresh();
      } catch (err) {
        uploadError.textContent = err.message || 'Upload failed';
      } finally {
        busy = false;
        uploadSubmit.disabled = false;
      }
    });

    function showConnectionLost() {
      connectionLost = true;
      zoomWrap.hidden = true;
      emptyEl.hidden = false;
      emptyEl.textContent = 'Connection lost. Retrying…';
      metaEl.textContent = '';
    }

    function resetZoom() {
      scale = 1;
      offsetX = 0;
      offsetY = 0;
      applyTransform();
    }

    function applyTransform() {
      zoomWrap.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
    }

    function touchDistance(t0, t1) {
      const dx = t1.clientX - t0.clientX;
      const dy = t1.clientY - t0.clientY;
      return Math.hypot(dx, dy);
    }

    function titleWithKey(title, key) {
      const k = (key || '').trim();
      return k ? `${title} (${k})` : title;
    }

    function titleWithMarker(title, key, isPlaceholder) {
      return titleWithKey(title, key) + (isPlaceholder ? ' ⚠' : '');
    }

    async function refresh() {
      try {
        const res = await fetch('/api/state');
        if (!res.ok) throw new Error('state unavailable');
        const s = await res.json();
        connectionLost = false;
        if (!s.songs || s.songs.length === 0) {
          zoomWrap.hidden = true;
          emptyEl.hidden = false;
          emptyEl.textContent = 'No songs in this playlist.';
          metaEl.textContent = s.playlistName || '';
          lastSongIndex = -1;
          lastPageIndex = -1;
          return;
        }
        emptyEl.hidden = true;
        zoomWrap.hidden = false;
        const song = s.songs[s.songIndex];
        const pageCount = song.pageCount || 1;
        const pageLabel = pageCount > 1 ? ` · page ${s.pageIndex + 1}/${pageCount}` : '';
        metaEl.textContent = `${s.playlistName || 'Playlist'} · ${s.songIndex + 1}/${s.songs.length}: ${titleWithMarker(song.title, song.key, song.isPlaceholder)}${pageLabel}`;

        const contentChanged = s.songIndex !== lastSongIndex || s.pageIndex !== lastPageIndex;
        if (contentChanged) {
          resetZoom();
          lastSongIndex = s.songIndex;
          lastPageIndex = s.pageIndex;
          media.src = `/api/media?song=${s.songIndex}&page=${s.pageIndex}`;
        }
      } catch (_) {
        showConnectionLost();
      }
    }

    async function navigate(direction) {
      if (busy || scale > NAV.ZOOM_NAV_MAX) return;
      busy = true;
      try {
        await fetch('/api/navigate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ direction }),
        });
        await refresh();
      } finally {
        busy = false;
      }
    }

    stage.addEventListener('touchstart', (e) => {
      if (e.touches.length === 1) {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
        tapMoved = false;
        if (scale > NAV.ZOOM_NAV_MAX) {
          panStartX = e.touches[0].clientX;
          panStartY = e.touches[0].clientY;
          panOffsetStartX = offsetX;
          panOffsetStartY = offsetY;
        }
      } else if (e.touches.length === 2) {
        pinchStartDist = touchDistance(e.touches[0], e.touches[1]);
        pinchStartScale = scale;
      }
    }, { passive: true });

    stage.addEventListener('touchmove', (e) => {
      if (e.touches.length === 1) {
        const dx = e.touches[0].clientX - touchStartX;
        const dy = e.touches[0].clientY - touchStartY;
        if (Math.abs(dx) > NAV.TAP_MOVE_PX || Math.abs(dy) > NAV.TAP_MOVE_PX) tapMoved = true;
      }
      if (e.touches.length === 2) {
        const dist = touchDistance(e.touches[0], e.touches[1]);
        if (pinchStartDist > 0) {
          scale = Math.min(NAV.MAX_ZOOM, Math.max(1, pinchStartScale * (dist / pinchStartDist)));
          if (scale <= 1) {
            scale = 1;
            offsetX = 0;
            offsetY = 0;
          }
          applyTransform();
        }
      } else if (e.touches.length === 1 && scale > NAV.ZOOM_NAV_MAX) {
        offsetX = panOffsetStartX + (e.touches[0].clientX - panStartX);
        offsetY = panOffsetStartY + (e.touches[0].clientY - panStartY);
        applyTransform();
      }
    }, { passive: true });

    stage.addEventListener('touchend', (e) => {
      if (e.touches.length === 0 && scale <= NAV.ZOOM_NAV_MAX) {
        const endX = e.changedTouches[0].clientX;
        const endY = e.changedTouches[0].clientY;
        const dx = endX - touchStartX;
        const dy = endY - touchStartY;
        if (Math.abs(dx) >= NAV.SWIPE_PX && Math.abs(dx) >= Math.abs(dy)) {
          navigate(dx < 0 ? 'next' : 'prev');
        } else if (!tapMoved) {
          handleSideTap(endX);
        }
        lastTouchEnd = Date.now();
      }
      if (e.touches.length < 2) {
        pinchStartDist = 0;
      }
      if (scale < 1) {
        resetZoom();
      }
    }, { passive: true });

    stage.addEventListener('click', (e) => {
      if (Date.now() - lastTouchEnd < 400) return;
      handleSideTap(e.clientX);
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') navigate('next');
      if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') navigate('prev');
    });

    refresh();
    setInterval(refresh, 3000);
  </script>
</body>
</html>
