<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Edit playlist — Stage Manager</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100%; background: #111; color: #fff; font-family: sans-serif; }
    #header { position: relative; z-index: 5; background: rgba(0,0,0,.92); border-bottom: 1px solid #333; padding: 12px 16px; display: -webkit-box; display: -webkit-flex; display: flex; -webkit-box-align: center; -webkit-align-items: center; align-items: center; -webkit-box-pack: justify; -webkit-justify-content: space-between; justify-content: space-between; }
    #title { font-size: 18px; font-weight: 700; -webkit-box-flex: 1; -webkit-flex: 1; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-right: 12px; }
    #doneBtn { background: #7ecbff; color: #000; border: none; border-radius: 8px; padding: 10px 16px; font-size: 15px; font-weight: 600; cursor: pointer; -webkit-flex-shrink: 0; flex-shrink: 0; }
    #doneBtn:disabled { opacity: .5; cursor: default; }
    #content { padding: 12px 16px 32px; max-width: 640px; margin: 0 auto; }
    #empty { text-align: center; opacity: .75; padding: 32px 16px; }
    #empty[hidden], .song-meta[hidden] { display: none !important; }
    #list { list-style: none; padding: 0; }
    #list li { margin-bottom: 8px; }
    .row { display: -webkit-box; display: -webkit-flex; display: flex; -webkit-box-align: center; -webkit-align-items: center; align-items: center; background: #1e1e1e; border: 1px solid #333; border-radius: 10px; padding: 12px; }
    .row.dragging { opacity: .55; }
    .row.drag-over { border-color: #7ecbff; }
    .handle { color: #888; font-size: 18px; cursor: grab; -webkit-user-select: none; user-select: none; padding: 0 4px; line-height: 1; -webkit-flex-shrink: 0; flex-shrink: 0; margin-right: 10px; }
    .info { -webkit-box-flex: 1; -webkit-flex: 1; flex: 1; min-width: 0; }
    .song-title { font-size: 16px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .song-meta { font-size: 13px; opacity: .75; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .removeBtn { background: transparent; border: 1px solid #666; color: #fff; border-radius: 8px; padding: 8px 12px; font-size: 13px; cursor: pointer; -webkit-flex-shrink: 0; flex-shrink: 0; margin-left: 10px; }
    .removeBtn:disabled { opacity: .4; cursor: default; }
    #addSection { margin-top: 24px; border-top: 1px solid #333; padding-top: 20px; }
    #addSection h2 { font-size: 16px; margin-bottom: 10px; }
    #searchInput { width: 100%; padding: 12px; border: 1px solid #444; border-radius: 8px; background: #000; color: #fff; font-size: 16px; }
    #searchResults { margin-top: 8px; }
    .searchRow { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 12px; cursor: pointer; margin-bottom: 4px; }
    .searchRow.placeholder { border-color: #665500; }
    #error { color: #ff8a80; font-size: 14px; margin: 12px 0; min-height: 1.2em; }
    #content.busy { opacity: .6; pointer-events: none; }
  </style>
</head>
<body>
  <div id="header">
    <div id="title">Playlist</div>
    <button id="doneBtn" type="button">Done</button>
  </div>
  <div id="content">
    <div id="error"></div>
    <ul id="list"></ul>
    <div id="empty" hidden>No songs in this playlist.</div>
    <div id="addSection">
      <h2>Add song from archive</h2>
      <input id="searchInput" type="search" placeholder="Search songs…" autocomplete="off" />
      <div id="searchResults"></div>
    </div>
  </div>
  <script src="/compat.js"></script>
  <script src="/song-display.js"></script>
  <script>
    var titleEl = document.getElementById('title');
    var doneBtn = document.getElementById('doneBtn');
    var listEl = document.getElementById('list');
    var emptyEl = document.getElementById('empty');
    var errorEl = document.getElementById('error');
    var searchInput = document.getElementById('searchInput');
    var searchResults = document.getElementById('searchResults');
    var contentEl = document.getElementById('content');

    var playlistId = RemoteCompat.getQueryParam('playlist');
    var playlistApi = playlistId && /^\d+$/.test(playlistId)
      ? '/api/playlists/' + playlistId
      : null;

    function playlistQuery() {
      return playlistId ? '?playlist=' + playlistId : '';
    }

    var entries = [];
    var busy = false;
    var dragFrom = -1;
    var searchTimer = null;

    function setBusy(on) {
      busy = on;
      contentEl.className = on ? 'busy' : '';
      doneBtn.disabled = on;
    }

    function metaLine(entry) {
      var note = SongDisplay.notesLine(entry.notes);
      var parts = [];
      if (entry.key) parts.push(entry.key);
      if (note) parts.push(note);
      return parts.join(' \u00b7 ');
    }

    function renderList() {
      listEl.innerHTML = '';
      if (!entries.length) {
        RemoteCompat.setHidden(emptyEl, false);
        return;
      }
      RemoteCompat.setHidden(emptyEl, true);
      for (var index = 0; index < entries.length; index++) {
        (function(entry, idx) {
          var li = document.createElement('li');
          li.className = 'row';
          li.draggable = true;
          li.innerHTML =
            '<span class="handle" aria-hidden="true">\u2261</span>' +
            '<div class="info"><div class="song-title"></div><div class="song-meta"></div></div>' +
            '<button class="removeBtn" type="button">Remove</button>';
          li.querySelector('.song-title').textContent =
            SongDisplay.adjustedSongTitle(entry.title, entry.key, entry.isPlaceholder);
          var meta = metaLine(entry);
          var metaElNode = li.querySelector('.song-meta');
          if (meta) metaElNode.textContent = meta;
          else RemoteCompat.setHidden(metaElNode, true);

          li.querySelector('.removeBtn').addEventListener('click', function() {
            removeEntry(entry.entryId);
          });
          li.addEventListener('dragstart', function(e) {
            dragFrom = idx;
            li.className = 'row dragging';
            if (e.dataTransfer) e.dataTransfer.effectAllowed = 'move';
          });
          li.addEventListener('dragend', function() {
            dragFrom = -1;
            li.className = 'row';
            var overs = listEl.querySelectorAll('.drag-over');
            for (var i = 0; i < overs.length; i++) overs[i].className = 'row';
          });
          li.addEventListener('dragover', function(e) {
            if (e.preventDefault) e.preventDefault();
            li.className = 'row drag-over';
          });
          li.addEventListener('dragleave', function() {
            li.className = 'row';
          });
          li.addEventListener('drop', function(e) {
            if (e.preventDefault) e.preventDefault();
            li.className = 'row';
            var to = idx;
            if (dragFrom < 0 || dragFrom === to) return;
            var next = entries.slice();
            var moved = next.splice(dragFrom, 1)[0];
            next.splice(to, 0, moved);
            var ids = [];
            for (var j = 0; j < next.length; j++) ids.push(next[j].entryId);
            reorder(ids);
          });
          listEl.appendChild(li);
        })(entries[index], index);
      }
    }

    function loadPlaylist() {
      if (!playlistApi) {
        errorEl.textContent = 'Add ?playlist={id} to the URL (see GET /api/playlists).';
        return;
      }
      setBusy(true);
      errorEl.textContent = '';
      RemoteCompat.get(playlistApi + '/entries', function(ok, data) {
        setBusy(false);
        if (!ok || !data) {
          errorEl.textContent = 'Could not load playlist';
          return;
        }
        titleEl.textContent = data.playlistName || 'Playlist';
        entries = data.entries || [];
        renderList();
      });
    }

    function reorder(entryIds) {
      setBusy(true);
      errorEl.textContent = '';
      RemoteCompat.postJson(playlistApi + '/reorder', { entryIds: entryIds }, function(ok, data) {
        setBusy(false);
        if (!ok || !data) {
          errorEl.textContent = (data && data.error) ? data.error : 'Reorder failed';
          loadPlaylist();
          return;
        }
        entries = data.entries || [];
        renderList();
      });
    }

    function removeEntry(entryId) {
      if (busy) return;
      setBusy(true);
      errorEl.textContent = '';
      RemoteCompat.postJson(playlistApi + '/remove', { entryId: entryId }, function(ok, data) {
        setBusy(false);
        if (!ok || !data) {
          errorEl.textContent = (data && data.error) ? data.error : 'Remove failed';
          loadPlaylist();
          return;
        }
        entries = data.entries || [];
        renderList();
      });
    }

    function addPlaceholder(title) {
      if (busy) return;
      setBusy(true);
      errorEl.textContent = '';
      RemoteCompat.postJson(playlistApi + '/add-placeholder', { title: title }, function(ok, data) {
        setBusy(false);
        if (!ok || !data) {
          errorEl.textContent = (data && data.error) ? data.error : 'Add placeholder failed';
          return;
        }
        entries = data.entries || [];
        renderList();
        searchInput.value = '';
        searchResults.innerHTML = '';
      });
    }

    function addSong(songId) {
      if (busy) return;
      setBusy(true);
      errorEl.textContent = '';
      RemoteCompat.postJson(playlistApi + '/add', { songId: songId }, function(ok, data) {
        setBusy(false);
        if (!ok || !data) {
          errorEl.textContent = (data && data.error) ? data.error : 'Add failed';
          return;
        }
        entries = data.entries || [];
        renderList();
        searchInput.value = '';
        searchResults.innerHTML = '';
      });
    }

    function runSearch(query) {
      RemoteCompat.get('/api/songs/search?q=' + encodeURIComponent(query), function(ok, data) {
        if (!ok || !data) return;
        searchResults.innerHTML = '';
        var trimmed = query.replace(/^\s+|\s+$/g, '');
        if (trimmed) {
          var phRow = document.createElement('div');
          phRow.className = 'searchRow placeholder';
          phRow.innerHTML = '<div class="song-title"></div>';
          phRow.querySelector('.song-title').textContent = SongDisplay.addPlaceholderPrompt(trimmed);
          phRow.addEventListener('click', function() { addPlaceholder(trimmed); });
          searchResults.appendChild(phRow);
        }
        var songs = data.songs || [];
        for (var i = 0; i < songs.length; i++) {
          (function(song) {
            var row = document.createElement('div');
            row.className = 'searchRow';
            var meta = [song.key, SongDisplay.notesLine(song.notes)].filter(function(x) { return !!x; }).join(' \u00b7 ');
            row.innerHTML = '<div class="song-title"></div>' + (meta ? '<div class="song-meta"></div>' : '');
            row.querySelector('.song-title').textContent =
              SongDisplay.adjustedSongTitle(song.title, song.key, song.isPlaceholder);
            if (meta) row.querySelector('.song-meta').textContent = meta;
            row.addEventListener('click', function() { addSong(song.id); });
            searchResults.appendChild(row);
          })(songs[i]);
        }
      });
    }

    doneBtn.addEventListener('click', function() {
      window.location.href = playlistId ? '/play?playlist=' + playlistId : '/';
    });

    searchInput.addEventListener('input', function() {
      clearTimeout(searchTimer);
      var q = searchInput.value.replace(/^\s+|\s+$/g, '');
      searchTimer = setTimeout(function() { runSearch(q); }, 200);
    });

    loadPlaylist();
    runSearch('');
  </script>
</body>
</html>
