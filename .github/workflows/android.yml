name: Android CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0 ndk;26.1.10909125'

      - name: Resolve version
        id: version
        run: echo "version=1.0.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build cloudflared for Android
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/26.1.10909125
        run: bash scripts/fetch-cloudflared.sh

      - name: Unit tests
        run: |
          ./gradlew :app:compileDebugKotlin :app:testDebugUnitTest --stacktrace --no-daemon

      - name: Build release APK (arm64-v8a)
        run: ./gradlew :app:assembleRelease --stacktrace --no-daemon

      - name: Stage release artifacts
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          src="$(ls app/build/outputs/apk/release/*.apk | head -n1)"
          cp "$src" "artifacts/app-${VERSION}.apk"
          cp "$src" artifacts/app.apk
          ls -la artifacts/

      - name: Upload release artifacts
        uses: actions/upload-artifact@v5
        with:
          name: app-${{ steps.version.outputs.version }}
          path: artifacts/*.apk
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download APK artifacts
        uses: actions/download-artifact@v5
        with:
          name: app-${{ needs.build.outputs.version }}
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.version }}
          name: Stage Manager ${{ needs.build.outputs.version }}
          generate_release_notes: true
          make_latest: true
          files: |
            artifacts/app-${{ needs.build.outputs.version }}.apk
            artifacts/app.apk
